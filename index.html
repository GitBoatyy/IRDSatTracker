<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKYTRAC Iridium Satellite Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
</head>
<body>
    <header class="app-header">
        <a class="brand-link" href="https://skytrac.ca/" target="_blank" rel="noopener">

                        </g>
                    </g>
                    <path class="st0" d="M452.9,89.4h22.5c16,0,23.9-12.4,23.9-24.1c0-11.6-7.9-23.8-23.9-23.9h-29.1v115.7h-18.8V21.8h47.9   c28.6,0,42.9,22.1,42.9,43.5c0,19.1-9.8,36.6-33.7,40.4l33.9,51.4h-21.6L452.9,89.4z"></path>
                    <path class="st0" d="M650.1,40.7c11.2-12.3,26.9-20.4,44.3-20.4c25.4,0,45.8,14.5,55.6,38.5h-20c-8.1-12.8-20.8-19-35.7-19   c-12.3,0-22.6,5.7-30.7,14.7c-8,9-13.2,21.1-13.2,35.2c0,13.7,5.1,25.8,13.2,34.8c8,9,18.4,14.7,30.7,14.7   c14.8,0,27.8-7.2,35.8-18.9l20.2,0c-10.4,23.4-30.6,38.5-56.1,38.5c-17.4,0-33.1-7.8-44.3-20.4c-11-12.5-18.3-29.8-18.3-48.7   C631.8,70.4,639.1,53.2,650.1,40.7z"></path>
                    <path class="st0" d="M607.3,120.1h-55.1l-14.5,37h-19.2l53.3-135.3h16.1l53.3,135.3h-19.2L607.3,120.1z M559.3,102.1h40.9l-20.5-52   L559.3,102.1z"></path>
                    <g>
                        <polygon class="st0" points="331.2,21.8 319.3,41.4 353.4,41.4 353.4,157.1 372.3,157.1 372.3,41.4 419,41.4 419,21.8   "></polygon>
                    </g>
                    <path class="st0" d="M79.9,58.8C79,45.2,66.1,39.7,54.5,39.7c-12.1,0-29.2,6.5-29.2,21.1c0,15.8,17.8,17.6,32,18.9   c18.2,2.3,46.8,7.3,46.8,37.9c0,26.2-25.4,41.4-49.3,41.4c-21.2,0-47.7-14.2-47.7-38.9h19.3c0.8,12.3,15.6,19.4,29.6,19.4   c14.2,0,28.8-8.9,28.8-21.7c0-17.5-17.7-16.8-36.3-19.3C31.6,96.2,6.2,90.3,6.2,60.8c0-22.9,21.9-40.3,49.2-40.3   c20.5,0,41.4,10.7,43.5,38.3H79.9z"></path>
                    <path class="st0" d="M265,81.1l36.2-59.3h21.6l-48.2,79.1v56.1h-19.1v-56.1l-46.3-79.1h21.6L265,81.1z"></path>
                </g>
            </svg>
        </a>
        <div class="app-title" aria-label="Application name">Iridium Satellite Tracker</div>
        <button id="mobile-menu-toggle" class="icon-button mobile-menu-button" type="button" aria-controls="app-sidebar" aria-expanded="false" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div id="map"></div>
    <div id="mobile-menu-backdrop" class="mobile-menu-backdrop" hidden></div>

    <aside id="app-sidebar" class="app-sidebar" aria-label="Satellite tracker controls">
        <div class="sidebar-topline">
            <button id="mobile-menu-close" class="icon-button sidebar-close-button" type="button" aria-label="Close menu">
                <span></span>
                <span></span>
            </button>
            <button id="theme-toggle-btn" class="theme-toggle-button" type="button" aria-label="Switch to light mode" aria-pressed="true">
                <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                </span>
                <span class="theme-toggle-label">Dark</span>
            </button>
        </div>

        <section id="controls" class="sidebar-section control-section">
            <div class="section-heading">
                <h2>Base Map</h2>
                <button class="section-collapse-toggle" type="button" aria-label="Collapse Base Map" aria-expanded="true">-</button>
            </div>
            <div class="panel-content">
                <button id="current-location-btn" class="primary-action" type="button">Use Current Location</button>

                <div class="control-field">
                    <label for="base-map-select">Base Map</label>
                    <select id="base-map-select">
                        <option value="dark">Dark</option>
                        <option value="street">Street</option>
                        <option value="topography">Topography</option>
                    </select>
                </div>

                <div id="coverage-toggle" class="switch-row">
                    <input type="checkbox" id="toggle-coverage-checkbox" checked>
                    <label for="toggle-coverage-checkbox">Coverage Lines</label>
                </div>

                <div id="spares-toggle" class="switch-row">
                    <input type="checkbox" id="toggle-spares-checkbox">
                    <label for="toggle-spares-checkbox">Spare Satellites</label>
                </div>

                <div id="coverage-circles-toggle" class="switch-row">
                    <input type="checkbox" id="toggle-coverage-circles-checkbox" checked>
                    <label for="toggle-coverage-circles-checkbox">Coverage Footprints</label>
                </div>

                <div id="sv-id-toggle" class="switch-row">
                    <input type="checkbox" id="toggle-sv-id-checkbox">
                    <label for="toggle-sv-id-checkbox">SV ID Labels</label>
                </div>

                <div id="terrain-mask-toggle" class="switch-row">
                    <input type="checkbox" id="toggle-terrain-mask-checkbox" checked>
                    <label for="toggle-terrain-mask-checkbox">Terrain Mask</label>
                </div>

                <div id="terrain-status" class="status-message" aria-live="polite"></div>
            </div>
        </section>

        <form id="location-editor" class="sidebar-section">
            <div class="section-heading">
                <h2>Observer Pin</h2>
                <button class="section-collapse-toggle" type="button" aria-label="Collapse Observer Pin" aria-expanded="true">-</button>
            </div>
            <div class="panel-content">
                <div class="location-editor-grid">
                    <label class="location-field" for="location-latitude-input">
                        <span>Latitude</span>
                        <input type="number" id="location-latitude-input" step="any" min="-90" max="90" placeholder="49.2827">
                    </label>
                    <label class="location-field" for="location-longitude-input">
                        <span>Longitude</span>
                        <input type="number" id="location-longitude-input" step="any" min="-180" max="180" placeholder="-123.1207">
                    </label>
                    <label class="location-field" for="location-altitude-input">
                        <span>Altitude (m ASL)</span>
                        <input type="number" id="location-altitude-input" step="any" placeholder="Optional">
                    </label>
                </div>
                <button id="location-apply-btn" class="secondary-action" type="submit">Drop Pin</button>
                <div id="location-editor-status" class="status-message" aria-live="polite"></div>
            </div>
        </form>

        <section id="satellite-info" class="sidebar-section data-section">
            <div class="section-heading">
                <h2>Selected Sat</h2>
                <button class="section-collapse-toggle" type="button" aria-label="Collapse Selected Sat" aria-expanded="true">-</button>
            </div>
            <div id="satellite-info-content" class="panel-content data-content"></div>
        </section>

        <section id="satellite-list" class="sidebar-section data-section">
            <div class="section-heading">
                <h2>Visibility Queue</h2>
                <button class="section-collapse-toggle" type="button" aria-label="Collapse Visibility Queue" aria-expanded="true">-</button>
            </div>
            <div id="satellite-list-content" class="panel-content data-content"></div>
        </section>
    </aside>

    <section id="mobile-status" class="mobile-status" aria-label="Current satellite status">
        <div>
            <span>Timeline</span>
            <strong id="mobile-time-readout">Live</strong>
        </div>
        <div>
            <span>Visible Sat</span>
            <strong id="mobile-connected-sat">None</strong>
        </div>
        <div>
            <span>Visibility</span>
            <strong id="mobile-visibility">Waiting</strong>
        </div>
        <div>
            <span>Look Angle</span>
            <strong id="mobile-angle">--</strong>
        </div>
        <div>
            <span>Terrain</span>
            <strong id="mobile-elevation">--</strong>
        </div>
    </section>

    <button id="timeline-toggle-btn" class="timeline-toggle" type="button" aria-controls="timeline-dock" aria-expanded="true">Hide Timeline</button>

    <div id="timeline-dock" class="timeline-dock">
        <div class="panel-content">
            <div id="timeline-inputs">
                <div class="timeline-field">
                    <label for="utc-date-input">UTC Date</label>
                    <input type="date" id="utc-date-input">
                </div>
                <div class="timeline-field">
                    <label for="utc-time-input">UTC Time</label>
                    <input type="time" id="utc-time-input" step="1">
                </div>
                <div id="timeline-actions">
                    <button id="playback-toggle-btn" type="button">Play</button>
                    <button id="live-time-btn" type="button">Return to Live</button>
                </div>
            </div>
            <div id="timeline-controls">
                <div id="timeline-label-row">
                    <label for="time-slider">UTC Timeline</label>
                    <div id="timeline-readout">Live</div>
                </div>
                <input type="range" id="time-slider">
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/satellite.js@4.0.0/dist/satellite.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
